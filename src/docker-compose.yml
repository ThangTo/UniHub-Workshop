name: unihub-workshop

# UniHub Workshop infrastructure & app stack.
# - infra-only: `docker compose up -d postgres redis rabbitmq minio mailhog`
# - full stack: `docker compose up -d --build`

services:
  postgres:
    image: postgres:16-alpine
    container_name: unihub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unihub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unihub}
      POSTGRES_DB: ${POSTGRES_DB:-unihub}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-unihub} -d ${POSTGRES_DB:-unihub}']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: unihub-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: unihub-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-unihub}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-unihub}
    ports:
      - '${RABBITMQ_PORT:-5672}:5672'
      - '${RABBITMQ_MANAGEMENT_PORT:-15672}:15672'
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: unihub-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-unihub}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-unihub-secret}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/ready']
      interval: 5s
      timeout: 3s
      retries: 20

  mailhog:
    image: mailhog/mailhog:latest
    container_name: unihub-mailhog
    restart: unless-stopped
    ports:
      - '${MAILHOG_SMTP_PORT:-1025}:1025'
      - '${MAILHOG_UI_PORT:-8025}:8025'

  backend:
    profiles: ['app', 'all']
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: unihub-backend
    restart: unless-stopped
    env_file:
      - path: ./apps/backend/.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      DATABASE_URL: postgresql://${POSTGRES_USER:-unihub}:${POSTGRES_PASSWORD:-unihub}@postgres:5432/${POSTGRES_DB:-unihub}?schema=public
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-unihub}:${RABBITMQ_PASSWORD:-unihub}@rabbitmq:5672
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@unihub.local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-Admin@123456}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-System Admin}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      JWT_ISSUER: ${JWT_ISSUER:-unihub-workshop}
      BCRYPT_COST: ${BCRYPT_COST:-12}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174}
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_USE_SSL: 'false'
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-unihub}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-unihub-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-unihub}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      SMTP_HOST: mailhog
      SMTP_PORT: '1025'
      SMTP_FROM: ${SMTP_FROM:-UniHub <no-reply@unihub.local>}
      MOCK_PG_URL: http://mock-pg:4000
      MOCK_PG_WEBHOOK_SECRET: ${MOCK_PG_WEBHOOK_SECRET:-mock-pg-secret}
      MOCK_AI_URL: http://mock-ai:4100
      PAYMENT_TIMEOUT_MS: ${PAYMENT_TIMEOUT_MS:-3000}
      PAYMENT_CB_ERROR_THRESHOLD: ${PAYMENT_CB_ERROR_THRESHOLD:-50}
      PAYMENT_CB_RESET_MS: ${PAYMENT_CB_RESET_MS:-30000}
      PAYMENT_CB_VOLUME_THRESHOLD: ${PAYMENT_CB_VOLUME_THRESHOLD:-20}
      PAYMENT_CB_ROLLING_MS: ${PAYMENT_CB_ROLLING_MS:-10000}
      RATE_LIMIT_GLOBAL_REGISTRATION_RPS: ${RATE_LIMIT_GLOBAL_REGISTRATION_RPS:-500}
      RATE_LIMIT_REGQUEUE_TTL_SECONDS: ${RATE_LIMIT_REGQUEUE_TTL_SECONDS:-10}
      RATE_LIMIT_REGQUEUE_MAX_ITEMS: ${RATE_LIMIT_REGQUEUE_MAX_ITEMS:-200000}
      IDEMPOTENCY_REDIS_TTL_SECONDS: ${IDEMPOTENCY_REDIS_TTL_SECONDS:-86400}
      CSV_DROP_DIR: /repo/apps/backend/data/csv-drop
      CSV_QUARANTINE_DIR: /repo/apps/backend/data/csv-quarantine
      CSV_ARCHIVE_DIR: /repo/apps/backend/data/csv-archive
      CSV_CRON: ${CSV_CRON:-0 2 * * *}
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    volumes:
      - ./data/keys:/repo/apps/backend/data/keys
      - ./data/csv-drop:/repo/apps/backend/data/csv-drop
      - ./data/csv-quarantine:/repo/apps/backend/data/csv-quarantine
      - ./data/csv-archive:/repo/apps/backend/data/csv-archive
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 30

  mock-pg:
    profiles: ['app', 'mocks', 'all']
    build:
      context: .
      dockerfile: services/mock-pg/Dockerfile
    container_name: unihub-mock-pg
    restart: unless-stopped
    environment:
      PORT: '4000'
      WEBHOOK_URL: http://backend:3000/payments/webhook
      WEBHOOK_SECRET: ${MOCK_PG_WEBHOOK_SECRET:-mock-pg-secret}
    ports:
      - '4000:4000'

  mock-ai:
    profiles: ['app', 'mocks', 'all']
    build:
      context: .
      dockerfile: services/mock-ai/Dockerfile
    container_name: unihub-mock-ai
    restart: unless-stopped
    environment:
      PORT: '4100'
    ports:
      - '4100:4100'

  student-web:
    profiles: ['web', 'all']
    build:
      context: .
      dockerfile: apps/student-web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-3000}
    container_name: unihub-student-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '${STUDENT_WEB_PORT:-5173}:80'

  admin-web:
    profiles: ['web', 'all']
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-3000}
    container_name: unihub-admin-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '${ADMIN_WEB_PORT:-5174}:80'
