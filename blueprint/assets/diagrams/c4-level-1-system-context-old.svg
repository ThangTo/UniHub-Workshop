<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">C4 Level 1 - System Context - UniHub Workshop</title>
  <desc id="desc">System context diagram showing users, UniHub Workshop, and external systems.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .box-title { font: 700 21px Arial, sans-serif; fill: #0f172a; }
      .box-body { font: 400 15px Arial, sans-serif; fill: #334155; }
      .actor { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2.5; }
      .system { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; }
      .external { fill: #fef3c7; stroke: #d97706; stroke-width: 2.5; }
      .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .label { font: 600 14px Arial, sans-serif; fill: #1e293b; }
      .label-bg { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; rx: 6; }
      .legend-title { font: 700 14px Arial, sans-serif; fill: #0f172a; }
      .legend { font: 400 13px Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect class="bg" width="1600" height="980"/>
  <text class="title" x="80" y="72">C4 Level 1 - System Context</text>
  <text class="subtitle" x="80" y="104">UniHub Workshop trong bức tranh toàn cảnh: người dùng, hệ thống chính, và các hệ thống ngoài tích hợp.</text>

  <g filter="url(#shadow)">
    <rect class="actor" x="90" y="185" width="285" height="120" rx="18"/>
    <text class="box-title" x="126" y="230">Sinh viên</text>
    <text class="box-body" x="126" y="260">Xem lịch workshop</text>
    <text class="box-body" x="126" y="284">Đăng ký, thanh toán, nhận QR</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="actor" x="90" y="355" width="285" height="120" rx="18"/>
    <text class="box-title" x="126" y="400">Ban tổ chức</text>
    <text class="box-body" x="126" y="430">Quản trị workshop</text>
    <text class="box-body" x="126" y="454">Upload PDF, xem thống kê</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="actor" x="90" y="525" width="285" height="120" rx="18"/>
    <text class="box-title" x="126" y="570">Nhân sự check-in</text>
    <text class="box-body" x="126" y="600">Quét QR tại cửa phòng</text>
    <text class="box-body" x="126" y="624">Offline sync khi mất mạng</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="actor" x="90" y="695" width="285" height="120" rx="18"/>
    <text class="box-title" x="126" y="740">System Admin</text>
    <text class="box-body" x="126" y="770">Quản lý role, cấu hình</text>
    <text class="box-body" x="126" y="794">Theo dõi import/health</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="system" x="600" y="365" width="390" height="210" rx="24"/>
    <text class="box-title" x="664" y="435">UniHub Workshop</text>
    <text class="box-body" x="664" y="469">Quản lý đăng ký workshop</text>
    <text class="box-body" x="664" y="493">Thanh toán, QR, check-in</text>
    <text class="box-body" x="664" y="517">Thông báo, AI Summary, CSV sync</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="external" x="1190" y="180" width="320" height="115" rx="18"/>
    <text class="box-title" x="1230" y="225">Legacy SIS</text>
    <text class="box-body" x="1230" y="255">Export CSV sinh viên mỗi đêm</text>
    <text class="box-body" x="1230" y="278">Không có API trực tiếp</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="external" x="1190" y="350" width="320" height="115" rx="18"/>
    <text class="box-title" x="1230" y="395">Mock Payment Gateway</text>
    <text class="box-body" x="1230" y="425">Charge, refund, webhook</text>
    <text class="box-body" x="1230" y="448">Có thể giả lập timeout/down</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="external" x="1190" y="520" width="320" height="115" rx="18"/>
    <text class="box-title" x="1230" y="565">Mock AI Provider</text>
    <text class="box-body" x="1230" y="595">Sinh summary từ nội dung PDF</text>
    <text class="box-body" x="1230" y="618">Có thể đổi provider bằng env</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="external" x="1190" y="690" width="320" height="115" rx="18"/>
    <text class="box-title" x="1230" y="735">SMTP Server</text>
    <text class="box-body" x="1230" y="765">Gửi email xác nhận</text>
    <text class="box-body" x="1230" y="788">MailHog ở môi trường demo</text>
  </g>

  <path class="arrow" d="M375 245 C475 245, 500 395, 600 430"/>
  <rect class="label-bg" x="396" y="274" width="118" height="28"/>
  <text class="label" x="410" y="294">HTTPS</text>

  <path class="arrow" d="M375 415 C475 420, 505 448, 600 462"/>
  <rect class="label-bg" x="430" y="422" width="118" height="28"/>
  <text class="label" x="444" y="442">HTTPS</text>

  <path class="arrow" d="M375 585 C475 565, 505 515, 600 500"/>
  <rect class="label-bg" x="402" y="543" width="186" height="28"/>
  <text class="label" x="414" y="563">HTTPS / Offline sync</text>

  <path class="arrow" d="M375 755 C475 705, 505 590, 600 535"/>
  <rect class="label-bg" x="408" y="673" width="118" height="28"/>
  <text class="label" x="422" y="693">HTTPS</text>

  <path class="arrow" d="M990 430 C1080 335, 1110 242, 1190 238"/>
  <rect class="label-bg" x="1036" y="310" width="132" height="28"/>
  <text class="label" x="1048" y="330">CSV / SFTP</text>

  <path class="arrow" d="M990 458 C1085 440, 1105 410, 1190 408"/>
  <rect class="label-bg" x="1042" y="418" width="156" height="28"/>
  <text class="label" x="1054" y="438">HTTPS charge</text>

  <path class="arrow" d="M990 500 C1085 520, 1105 575, 1190 578"/>
  <rect class="label-bg" x="1040" y="535" width="148" height="28"/>
  <text class="label" x="1052" y="555">HTTPS summary</text>

  <path class="arrow" d="M990 535 C1080 620, 1110 742, 1190 748"/>
  <rect class="label-bg" x="1044" y="660" width="92" height="28"/>
  <text class="label" x="1058" y="680">SMTP</text>

  <g transform="translate(80 895)">
    <text class="legend-title" x="0" y="0">Legend</text>
    <rect class="actor" x="0" y="18" width="22" height="16" rx="4"/><text class="legend" x="32" y="31">Actor</text>
    <rect class="system" x="105" y="18" width="22" height="16" rx="4"/><text class="legend" x="137" y="31">System under design</text>
    <rect class="external" x="315" y="18" width="22" height="16" rx="4"/><text class="legend" x="347" y="31">External system</text>
  </g>
</svg>
